
[package]
name = "rust-engine"
version = "0.1.0"
edition = "2021"

# Define both library and binary
[lib]
name = "rust_engine"
path = "src/lib.rs"

[[bin]]
name = "game"
path = "src/game/main.rs"


[dependencies]
# Window and event handling
winit = "0.28"

# Vulkano - Safe Vulkan wrapper
vulkano = "0.34"

# Shader compilation at build time
vulkano-shaders = "0.34"

# Window surface integration
vulkano-win = "0.34"

# Math library
glam = "0.29"

# Image loading (for textures later)
image = "0.25"
bytemuck = "1.24.0"

gltf = "1.4"

# Small vector optimization
smallvec = "1.13"

# ECS
hecs = "0.10"

# File watching for hot-reload
notify = "6.1"

# Thread-safe locking primitives
parking_lot = "0.12"

# Math library (nalgebra for glm-style functions)
nalgebra-glm = "0.18"

# Async runtime for background loading
tokio = { version = "1.35", features = ["rt", "rt-multi-thread", "sync"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
ron = "0.8"                                        # Rusty Object Notation
typetag = "0.2"                                    # Polymorphic serialization

# Immediate Mode GUI (custom implementation for Vulkano 0.34)
egui = "0.33.2"
egui-winit = "0.33.2"

[profile.dev]
opt-level = 1

[profile.release]
opt-level = 3
lto = true
